name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + typecheck + test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      # All nine packages, in dependency order. Scoped with -w flags (not the
      # root build script) so examples/ never enter the package CI contract.
      - name: Build all packages
        run: |
          npm run build:packages

      - name: Typecheck — @ahtmljs/schema
        run: cd packages/schema && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/next
        run: cd packages/next && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/agent
        run: cd packages/agent && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/vite
        run: cd packages/vite && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/langchain
        run: cd packages/langchain && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/hono
        run: cd packages/hono && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/cli
        run: cd packages/cli && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/kv
        run: cd packages/kv && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/webmcp
        run: cd packages/webmcp && npx tsc --noEmit -p tsconfig.json

      - name: Unit tests — @ahtmljs/schema
        run: cd packages/schema && npm test

      - name: Unit tests — @ahtmljs/next
        run: cd packages/next && npm test

      - name: Unit tests — @ahtmljs/agent
        run: cd packages/agent && npm test

      - name: Unit tests — @ahtmljs/vite
        run: cd packages/vite && npm test

      - name: Unit tests — @ahtmljs/langchain
        run: cd packages/langchain && npm test

      - name: Unit tests — @ahtmljs/hono
        run: cd packages/hono && npm test

      - name: Unit tests — @ahtmljs/cli
        run: cd packages/cli && npm test

      - name: Unit tests — @ahtmljs/kv
        run: cd packages/kv && npm test

      - name: Unit tests — @ahtmljs/webmcp
        run: cd packages/webmcp && npm test

      - name: Test — @ahtmljs/extract
        run: cd packages/extract && npm test

      - name: Test — @ahtmljs/astro
        run: cd packages/astro && npm test

      - name: Test — @ahtmljs/sveltekit
        run: cd packages/sveltekit && npm test

      - name: Test — @ahtmljs/insights
        run: cd packages/insights && npm test

      - name: Test — @ahtmljs/index
        run: cd packages/index && npm test

      - name: Test — @ahtmljs/badge
        run: cd packages/badge && npm test

      - name: Test — @ahtmljs/conformance
        run: cd packages/conformance && npm test

      - name: UX scenario tests
        run: npm run test:ux

      - name: Conformance tests
        run: npm run test:conformance

      # Resolves every documented entry point in BOTH module systems
      # (require + import) against the freshly built dist/.
      - name: Smoke-test CJS + ESM entry points
        run: npm run smoke:imports

      # Hard numeric limits from PLAN-NEXT-5.md, enforced as tests.
      # BUDGET_SCALE=2 doubles every limit because shared runners are
      # noisier than dev machines; the scale-1 contract holds locally.
      - name: Performance budgets
        run: npm run test:budgets
        env:
          BUDGET_SCALE: '2'

      # ----------------------------------------------------------------
      # Examples — not part of the package contract. Exercised once, on
      # Node 22 only: the Next.js landing does not support Node 18.
      # ----------------------------------------------------------------

      - name: Typecheck — examples/benchmark
        if: matrix.node == '22'
        run: cd examples/benchmark && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — examples/why-ahtml
        if: matrix.node == '22'
        run: cd examples/why-ahtml && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — examples/landing
        if: matrix.node == '22'
        run: cd examples/landing && npx tsc --noEmit -p tsconfig.json

      - name: Run benchmark (with real tokenizers)
        if: matrix.node == '22'
        run: npm run benchmark

      # Doubles as an end-to-end smoke test: exits non-zero if any 0.9.5
      # capability proof (MCP / signing / x402 / RFC 9421 / RSL) fails to run.
      - name: Run the "why AHTML" competitive benchmark
        if: matrix.node == '22'
        run: npm run benchmark:why

      - name: Build the landing (Next.js production build)
        if: matrix.node == '22'
        run: cd examples/landing && npx next build
