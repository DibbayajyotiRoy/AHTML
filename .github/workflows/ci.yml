name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build + typecheck + benchmark
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build all workspaces
        run: |
          npm run build -w @ahtmljs/schema
          npm run build -w @ahtmljs/next
          npm run build -w @ahtmljs/agent

      - name: Typecheck — @ahtmljs/schema
        run: cd packages/schema && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/next
        run: cd packages/next && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — @ahtmljs/agent
        run: cd packages/agent && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — examples/benchmark
        run: cd examples/benchmark && npx tsc --noEmit -p tsconfig.json

      - name: Typecheck — examples/landing
        run: cd examples/landing && npx tsc --noEmit -p tsconfig.json

      - name: Unit tests — @ahtmljs/schema (49 tests)
        run: cd packages/schema && npm test

      - name: Unit tests — @ahtmljs/next (38 tests)
        run: cd packages/next && npm test

      - name: Unit tests — @ahtmljs/agent (18 tests)
        run: cd packages/agent && npm test

      - name: UX scenario tests (30 tests — token-saving, action safety, incremental crawl, MCP, zero-config)
        run: npm run test:ux

      - name: Run benchmark (with real tokenizers)
        run: npm run benchmark

      - name: Build the landing (Next.js production build)
        run: cd examples/landing && npx next build
