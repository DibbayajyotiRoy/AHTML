name: python

on:
  push:
    branches: [main]
    paths: ['python/**', 'tests/conformance/**', '.github/workflows/python.yml']
  pull_request:
    paths: ['python/**', 'tests/conformance/**', '.github/workflows/python.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - uses: actions/setup-python@v5
        with: { python-version: '${{ matrix.python-version }}' }

      # The TS reference implementation generates the cross-implementation
      # fixtures the Python suite asserts byte-identity against.
      - run: npm ci
      - run: npm run build:packages
      - run: node python/tests/_gen_fixtures.mjs
      - run: node python/tests/_gen_signed.mjs

      - run: pip install -e 'python/[tokens]' pytest
      - run: python -m pytest python/tests/ -q
        env:
          AHTML_LIVE_TESTS: '1'

  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install build twine
      - run: python -m build python/
      - run: twine check python/dist/*
